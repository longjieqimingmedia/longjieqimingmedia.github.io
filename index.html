<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微表情识人术 | 7天速成手册</title>

        body {

        }

            max-width: 800px;

        }
        .price {

            margin: 30px auto;

            display: inline-block;
            padding: 12px 30px;
            background-color: white;
            color: #165DFF;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;

</html>
