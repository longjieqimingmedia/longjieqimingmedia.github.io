<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body{margin:0;padding:0;background:#f5f5f5;font-family:sans-serif;}
.cover{width:85%;max-width:380px;margin:30px auto;display:block;border-radius:16px;}
.paybox{background:#fff;margin:0 auto;max-width:380px;padding:20px;border-radius:12px;text-align:center;}
.qrcode{width:180px;margin:15px auto;display:block;}
input{width:85%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;text-align:center;}
button{width:85%;padding:12px;background:#007acc;color:#fff;border:none;border-radius:8px;font-size:16px;margin-top:10px;cursor:pointer;}
.content{display:none;max-width:380px;margin:30px auto;padding:20px;background:#fff;border-radius:12px;}
</style>
</head>
<body>

<!-- 正确的封面图标签 -->
<img class="cover" src="WechatIMG144.jpg" alt="微表情识人术笑脸封面">

<div class="paybox">
<p>扫码支付 9.9 元后，输入解锁码查看完整内容</p >
<img class="qrcode" src="shoukuanma.jpg" alt="收款码">
<input type="text" id="pwd" placeholder="请输入解锁码">
<button onclick="unlock()">解锁内容</button>
</div>

<div class="content" id="book">
</div>

<script>
function unlock(){
    let val = document.getElementById("pwd").value.trim();
    if(val === "123456"){
        document.getElementById("book").style.display = "block";
        alert("解锁成功");
    }else{
        alert("解锁码错误");
    }
}
</script>

</body>
</html>
